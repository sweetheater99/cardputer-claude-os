# MCP-tunnel stack for the Cardputer hardware-approval-key bridge.
#
#   cloud Claude  --tunnel-->  cloudflared  -->  mcp-proxy  -->  host:9000
#                                                            (cardputer-mcp daemon)
#
# Run on the same Mac that owns the BLE link to the device. The daemon
# itself runs NATIVELY (launchd), not in a container — CoreBluetooth is
# not reachable from Docker — so only these two containers live here.
#
# Image digests are pinned to the versions in the MCP-tunnels docs;
# update deliberately. See tunnel/README.md for setup.

services:
  mcp-proxy:
    image: us-docker.pkg.dev/anthropic-public-registry/images/mcp-proxy@sha256:6b9adedbf2763143ec72f106ecaf0ce7fd3294e89b208f54a1db97a33d14c5ba
    env_file: .env
    volumes:
      - ./config/mcp-proxy.yaml:/etc/mcp-gateway/config.yaml:ro
      - ./data:/data:ro
    # Lets the proxy reach the native host daemon at host.docker.internal.
    # Docker Desktop usually provides this automatically; pinned for
    # portability.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    command: tunnel --no-autoupdate run --url http://localhost:8080
    env_file: .env
    # Share the proxy's network namespace so localhost:8080 == the proxy
    # listener, and only outbound connections leave this host.
    network_mode: "service:mcp-proxy"
    restart: unless-stopped
